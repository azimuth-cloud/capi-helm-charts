---
# yaml-language-server: $schema=values.schema.json

# @schema
# type: boolean
# required: true
# @schema
# Included for schema validation purposes.
# Has no effect unless this chart is used
# as a conditional dependency of the
# openstack-cluster chart.
enabled: true

# The name of the Cluster API cluster
# if not given, the release name is used
# @schema
# type: [string, null]
# @schema
clusterName:

# @schema
# type: object
# required: true
# @schema
# Settings for the CNI addon
cni:
  # @schema
  # type: boolean
  # @schema
  # Indicates if a CNI should be deployed
  enabled: true
  # The CNI to deploy - supported values are calico or cilium
  # @schema
  # enum: [calico, cilium]
  # @schema
  type: calico
  # @schema
  # type: object
  # @schema
  # Settings for the calico CNI
  # See https://projectcalico.docs.tigera.io/getting-started/kubernetes/helm
  calico:
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://projectcalico.docs.tigera.io/charts
      # @schema
      # type: string
      # @schema
      name: tigera-operator
      # @schema
      # type: string
      # @schema
      version: v3.31.5
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: tigera-operator
      # @schema
      # additionalProperties: true
      # @schema
      values:
        # @schema
        # type: object
        # @schema
        nodeSelector:
          # @schema
          # type: string
          # @schema
          node-role.kubernetes.io/control-plane: ""
    # @schema
    # type: object
    # @schema
    # Nova metadata service
    # See https://docs.openstack.org/nova/latest/user/metadata.html#the-metadata-service
    globalNetworkPolicy:
      # @schema
      # type: string
      # @schema
      denyNamespaceSelector: kubernetes.io/metadata.name != 'openstack-system'
      # @schema
      # type: integer
      # @schema
      allowPriority: 20
      # @schema
      # type: integer
      # @schema
      denyPriority: 10
      # @schema
      # type: array
      # @schema
      allowEgressCidrs:
        - "0.0.0.0/0"
      # @schema
      # type: array
      # @schema
      denyEgressCidrs:
        - "169.254.169.254/32"
      # @schema
      # type: array
      # @schema
      allowv6EgressCidrs:
        - "::/0"
      # @schema
      # type: array
      # @schema
      denyv6EgressCidrs:
        - "fe80::a9fe:a9fe/128"
  # @schema
  # type: object
  # @schema
  # Settings for the Cilium CNI
  # See https://docs.cilium.io/en/stable/gettingstarted/k8s-install-helm/ for details
  cilium:
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://helm.cilium.io/
      # @schema
      # type: string
      # @schema
      name: cilium
      # @schema
      # type: string
      # @schema
      version: 1.19.3
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: kube-system
      # @schema
      # additionalProperties: true
      # @schema
      values: {}

# @schema
# type: object
# required: true
# @schema
# Settings for CSI addons
csi:
  # @schema
  # type: object
  # @schema
  # Settings for the CephFS CSI
  cephfs:
    # @schema
    # type: boolean
    # @schema
    enabled: false
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://ceph.github.io/csi-charts
      # @schema
      # type: string
      # @schema
      name: ceph-csi-cephfs
      # @schema
      # type: string
      # @schema
      version: 3.11.0
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: csi-ceph-system
      # @schema
      # additionalProperties: true
      # @schema
      values: {}

# @schema
# type: object
# required: true
# @schema
# Settings for the OpenStack integrations
openstack:
  # @schema
  # type: boolean
  # @schema
  # Indicates if the OpenStack integrations should be enabled
  enabled: false
  # @schema
  # type: string
  # @schema
  # The target namespace for the OpenStack integrations
  targetNamespace: openstack-system
  # @schema
  # type: object
  # @schema
  # cloud-config options for the OpenStack integrations
  # The [Global] section is configured to use the target cloud
  # See https://github.com/kubernetes/cloud-provider-openstack/blob/master/docs/openstack-cloud-controller-manager/using-openstack-cloud-controller-manager.md#config-openstack-cloud-controller-manager
  # and https://github.com/kubernetes/cloud-provider-openstack/blob/master/docs/cinder-csi-plugin/using-cinder-csi-plugin.md#block-storage
  cloudConfig:
    # @schema
    # type: object
    # @schema
    # By default, ignore volume AZs for Cinder as most clouds have a single globally-attachable Cinder AZ
    BlockStorage:
      # @schema
      # type: boolean
      # @schema
      ignore-volume-az: true
  # @schema
  # type: object
  # @schema
  # Settings for the Cloud Controller Manager (CCM)
  ccm:
    # @schema
    # type: boolean
    # @schema
    # Indicates if the OpenStack CCM should be enabled
    # By default, the CCM is enabled if the OpenStack integrations are enabled
    # See https://github.com/kubernetes/cloud-provider-openstack/blob/master/charts/openstack-cloud-controller-manager/values.yaml
    enabled: true
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://kubernetes.github.io/cloud-provider-openstack
      # @schema
      # type: string
      # @schema
      name: openstack-cloud-controller-manager
      # @schema
      # type: string
      # @schema
      version: 2.36.0
    # @schema
    # additionalProperties: true
    # @schema
    values: {}
  # @schema
  # type: object
  # @schema
  # Settings for the Cinder CSI plugin
  csiCinder:
    # @schema
    # type: boolean
    # @schema
    # Indicates if the Cinder CSI should be enabled
    # By default, it is enabled if the OpenStack integrations are enabled
    # See https://github.com/kubernetes/cloud-provider-openstack/blob/master/charts/cinder-csi-plugin/values.yaml
    enabled: true
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://kubernetes.github.io/cloud-provider-openstack
      # @schema
      # type: string
      # @schema
      name: openstack-cinder-csi
      # @schema
      # type: string
      # @schema
      version: 2.35.0
    # @schema
    # additionalProperties: true
    # @schema
    values:
      # @schema
      # type: object
      # @schema
      csi:
        # @schema
        # type: object
        # @schema
        plugin:
          # @schema
          # type: object
          # @schema
          controllerPlugin:
            # @schema
            # type: object
            # @schema
            nodeSelector:
              # @schema
              # type: string
              # @schema
              node-role.kubernetes.io/control-plane: ""
            # @schema
            # type: array
            # @schema
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                effect: NoSchedule
    # @schema
    # type: object
    # @schema
    # Definition of the default storage class for Cinder CSI
    defaultStorageClass:
      # @schema
      # type: boolean
      # @schema
      # Indicates if the storage class should be enabled
      enabled: true
      # @schema
      # type: string
      # @schema
      # The name of the storage class
      name: csi-cinder
      # @schema
      # type: boolean
      # @schema
      # Indicates if the Cinder default storage class is the cluster default storage class
      isClusterDefault: true
      # @schema
      # type: string
      # @schema
      # The reclaim policy for the storage class
      reclaimPolicy: Delete
      # @schema
      # type: boolean
      # @schema
      # Indicates if volume expansion is allowed
      allowVolumeExpansion: true
      # @schema
      # type: string
      # @schema
      # Controls when volume binding and dynamic provisioning should occur
      volumeBindingMode: WaitForFirstConsumer
      # The allowed topologies for the storage class
      # @schema
      # type: [object, null]
      # additionalProperties: true
      # @schema
      allowedTopologies:
      # Filesystem type to use for volumes provisioned with the storage class
      # If not given, the default filesystem type will be used
      # @schema
      # type: [string, null]
      # @schema
      fstype:
      # @schema
      # type: string
      # @schema
      # The Cinder availability zone to use for volumes provisioned by the storage class
      availabilityZone: nova
      # The Cinder volume type to use for volumes provisioned by the storage class
      # If not given, the default volume type will be used
      # @schema
      # type: [string, null]
      # @schema
      volumeType:
    # @schema
    # type: array
    # @schema
    # Additional storage classes to create for the Cinder CSI
    # For each item, the properties from the default storage class are supported (except enabled and isClusterDefault)
    additionalStorageClasses: []
  # @schema
  # type: object
  # @schema
  # Settings for the Manila CSI plugin
  csiManila:
    # @schema
    # type: boolean
    # @schema
    # Indicates if the Manila CSI should be enabled
    # By default, it is disabled as Manila is not commonly available
    # See https://github.com/kubernetes/cloud-provider-openstack/blob/master/charts/manila-csi-plugin/values.yaml
    enabled: false
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://kubernetes.github.io/cloud-provider-openstack
      # @schema
      # type: string
      # @schema
      name: openstack-manila-csi
      # @schema
      # type: string
      # @schema
      version: 2.30.0
    # @schema
    # additionalProperties: true
    # @schema
    values: {}
    # @schema
    # type: object
    # @schema
    # Definition of the default storage class for the Manila CSI
    defaultStorageClass:
      # @schema
      # type: boolean
      # @schema
      # Indicates if the storage class should be enabled
      enabled: true
      # @schema
      # type: string
      # @schema
      # The name of the storage class
      name: csi-manila
      # @schema
      # type: boolean
      # @schema
      # Indicates if the Manila default storage class is the cluster default storage class
      isClusterDefault: false
      # The provisioner for the storage class
      # If not given and the Ceph CSI plugin is installed, cephfs.manila.csi.openstack.org is used
      # @schema
      # type: [string, null]
      # @schema
      provisioner:
      # @schema
      # type: string
      # @schema
      # The reclaim policy for the storage class
      reclaimPolicy: Delete
      # @schema
      # type: boolean
      # @schema
      # Indicates if volume expansion is allowed
      allowVolumeExpansion: true
      # @schema
      # type: string
      # @schema
      # Controls when volume binding and dynamic provisioning should occur
      volumeBindingMode: WaitForFirstConsumer
      # The allowed topologies for the storage class
      # @schema
      # type: [string, null]
      # @schema
      allowedTopologies:
      # The parameters for the storage class
      # See https://github.com/kubernetes/cloud-provider-openstack/blob/master/docs/manila-csi-plugin/using-manila-csi-plugin.md#controller-service-volume-parameters
      # @schema
      # additionalProperties: true
      # @schema
      parameters:
        # The Manila share type to use
        # If not given and the Ceph CSI plugin is installed, cephfs is used
        # @schema
        # type: [string, null]
        # @schema
        type:
    # @schema
    # type: array
    # @schema
    # Additional storage classes to create for the Manila CSI
    # For each item, the properties from the default storage class are supported (except for "enabled")
    additionalStorageClasses: []
  # @schema
  # type: object
  # @schema
  k8sKeystoneAuth:
    # @schema
    # type: boolean
    # @schema
    enabled: false
    # @schema
    # type: string
    # @schema
    targetNamespace: kube-system
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://catalyst-cloud.github.io/capi-plugin-helm-charts
      # @schema
      # type: string
      # @schema
      name: k8s-keystone-auth
      # @schema
      # type: string
      # @schema
      version: 1.5.1

# @schema
# type: object
# required: true
# @schema
# Setting for Reloader used to restart workloads on Secret/ConfigMap changes
reloader:
  # @schema
  # type: boolean
  # @schema
  # Indicates if Reloader should be enabled
  enabled: false
  # @schema
  # type: object
  # @schema
  chart:
    # @schema
    # type: string
    # @schema
    repo: https://stakater.github.io/stakater-charts
    # @schema
    # type: string
    # @schema
    name: reloader
    # @schema
    # type: string
    # @schema
    version: 2.2.11
  # @schema
  # type: object
  # @schema
  release:
    # @schema
    # type: string
    # @schema
    # Deploy to the same namespace as OpenStack services
    namespace: openstack-system
    # @schema
    # additionalProperties: true
    # @schema
    values:
      # @schema
      # type: object
      # @schema
      reloader:
        # @schema
        # type: boolean
        # @schema
        # Restrict scope to namespace
        watchGlobally: false

# @schema
# type: object
# required: true
# @schema
# Settings for etcd defragmentation jobs
etcdDefrag:
  # @schema
  # type: boolean
  # @schema
  # Indicates if the etcd defragmentation job should be enabled
  enabled: true
  # @schema
  # type: object
  # @schema
  chart:
    # @schema
    # type: string
    # @schema
    repo: https://azimuth-cloud.github.io/capi-helm-charts
    # @schema
    # type: string
    # @schema
    name: etcd-defrag
    # @schema
    # type: [string, null]
    # @schema
    version:  # Defaults to the same version as this chart
  # @schema
  # type: object
  # @schema
  release:
    # @schema
    # type: string
    # @schema
    # This should be namespace in which the etcd pods are deployed
    namespace: kube-system
    # @schema
    # additionalProperties: true
    # @schema
    values: {}

# @schema
# type: object
# required: true
# @schema
# Settings for the metrics server
# https://github.com/kubernetes-sigs/metrics-server#helm-chart
metricsServer:
  # @schema
  # type: boolean
  # @schema
  # Indicates if the metrics server should be deployed
  enabled: true
  # @schema
  # type: object
  # @schema
  chart:
    # @schema
    # type: string
    # @schema
    repo: https://kubernetes-sigs.github.io/metrics-server
    # @schema
    # type: string
    # @schema
    name: metrics-server
    # @schema
    # type: string
    # @schema
    version: 3.13.0
  # @schema
  # type: object
  # @schema
  release:
    # @schema
    # type: string
    # @schema
    namespace: kube-system
    # @schema
    # additionalProperties: true
    # @schema
    values: {}

# @schema
# type: object
# required: true
# @schema
# Settings for ingress controllers
ingress:
  # @schema
  # type: boolean
  # @schema
  # Indicates if ingress controllers should be enabled
  enabled: false
  # @schema
  # type: object
  # @schema
  # Settings for the Nginx ingress controller
  # https://github.com/kubernetes/ingress-nginx/tree/main/charts/ingress-nginx#configuration
  nginx:
    # @schema
    # type: boolean
    # @schema
    # Indicates if the Nginx ingress controller should be enabled
    enabled: false
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://kubernetes.github.io/ingress-nginx
      # @schema
      # type: string
      # @schema
      name: ingress-nginx
      # @schema
      # type: string
      # @schema
      version: 4.15.1
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: ingress-nginx
      # @schema
      # additionalProperties: true
      # @schema
      values: {}
  # @schema
  # type: object
  # @schema
  # Settings for the Traefik ingress controller
  # https://github.com/traefik/traefik-helm-chart/blob/master/EXAMPLES.md
  traefik:
    # @schema
    # type: boolean
    # @schema
    # Indicates if the Traefik ingress controller should be enabled
    # The Traefik ingress controller is enabled by default if ingress controllers are enabled
    enabled: true
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://traefik.github.io/charts
      # @schema
      # type: string
      # @schema
      name: traefik
      # @schema
      # type: string
      # @schema
      version: 40.1.0
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: traefik
      # @schema
      # type: object
      # @schema
      values: {}

# @schema
# type: object
# required: true
# @schema
# Settings for cluster monitoring
monitoring:
  # @schema
  # type: boolean
  # @schema
  # Indicates if the cluster monitoring should be enabled
  enabled: false
  # @schema
  # type: object
  # @schema
  # Config for the kube-prometheus-stack helm chart
  # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack
  kubePrometheusStack:
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://prometheus-community.github.io/helm-charts
      # @schema
      # type: string
      # @schema
      name: kube-prometheus-stack
      # @schema
      # type: string
      # @schema
      version: 85.0.2
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: monitoring-system
      # @schema
      # additionalProperties: true
      # @schema
      values:
        # @schema
        # type: object
        # @schema
        # Enable persistence by default for prometheus and alertmanager
        alertmanager:
          # @schema
          # type: object
          # @schema
          alertmanagerSpec:
            # @schema
            # type: string
            # @schema
            # By default, retain 7 days of data
            retention: 168h
            # @schema
            # type: object
            # @schema
            storage:
              # @schema
              # type: object
              # @schema
              volumeClaimTemplate:
                # @schema
                # type: object
                # @schema
                spec:
                  # @schema
                  # type: array
                  # @schema
                  accessModes: ["ReadWriteOnce"]
                  # @schema
                  # type: object
                  # @schema
                  resources:
                    # @schema
                    # type: object
                    # @schema
                    requests:
                      # @schema
                      # type: string
                      # @schema
                      storage: 10Gi
        # @schema
        # type: object
        # @schema
        prometheus:
          # @schema
          # type: object
          # @schema
          prometheusSpec:
            # @schema
            # type: string
            # @schema
            # The amount of data that is retained will be 90 days or 95% of the size of the
            # persistent volume, whichever is reached first
            retention: 90d
            # @schema
            # type: object
            # @schema
            storageSpec:
              # @schema
              # type: object
              # @schema
              volumeClaimTemplate:
                # @schema
                # type: object
                # @schema
                spec:
                  # @schema
                  # type: array
                  # @schema
                  accessModes: ["ReadWriteOnce"]
                  # @schema
                  # type: object
                  # @schema
                  resources:
                    # @schema
                    # type: object
                    # @schema
                    requests:
                      # @schema
                      # type: string
                      # @schema
                      storage: 10Gi

  # @schema
  # deprecated: true
  # @schema
  lokiStack:
    # @schema
    # type: boolean
    # @schema
    enabled: true
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://grafana.github.io/helm-charts
      # @schema
      # type: string
      # @schema
      name: loki-stack
      # @schema
      # type: string
      # @schema
      version: 2.10.2
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: monitoring-system
      # @schema
      # additionalProperties: true
      # @schema
      values:
        # @schema
        # type: object
        # @schema
        loki:
          # @schema
          # type: object
          # @schema
          # Enable retention and configure a default retention period of 31 days
          config:
            # @schema
            # type: object
            # @schema
            compactor:
              # @schema
              # type: boolean
              # @schema
              retention_enabled: true
            # @schema
            # type: object
            # @schema
            limits_config:
              # @schema
              # type: string
              # @schema
              retention_period: 72h
          # @schema
          # type: object
          # @schema
          # Enable persistence by default
          persistence:
            # @schema
            # type: boolean
            # @schema
            enabled: true
            # @schema
            # type: string
            # @schema
            size: 10Gi
  # @schema
  # type: object
  # @schema
  # Configuration for the blackbox exporter
  blackboxExporter:
    # @schema
    # type: boolean
    # @schema
    enabled: true
    # @schema
    # type: object
    # @schema
    chart:
      # @schema
      # type: string
      # @schema
      repo: https://prometheus-community.github.io/helm-charts
      # @schema
      # type: string
      # @schema
      name: prometheus-blackbox-exporter
      # @schema
      # type: string
      # @schema
      version: 11.9.1
    # @schema
    # type: object
    # @schema
    release:
      # @schema
      # type: string
      # @schema
      namespace: monitoring-system
      # @schema
      # additionalProperties: true
      # @schema
      values: {}
    # @schema
    # type: object
    # @schema
        # Example of adding additional scrape targets
        # serviceMonitor:
        #   targets:
        #     - name: example
        #       url: http://example.com/healthz
    # Indicates if a blackbox target for the cloud's auth endpoint should be created
    openstackAuthUrlTarget:
      # @schema
      # type: boolean
      # @schema
      enabled: true

# @schema
# type: object
# required: true
# @schema
# Settings for node feature discovery
# https://github.com/kubernetes-sigs/node-feature-discovery/tree/master/deployment/helm/node-feature-discovery
nodeFeatureDiscovery:
  # @schema
  # type: boolean
  # @schema
  # Indicates if node feature discovery should be enabled
  enabled: true
  # @schema
  # type: object
  # @schema
  chart:
    # @schema
    # type: string
    # @schema
    repo: https://kubernetes-sigs.github.io/node-feature-discovery/charts
    # @schema
    # type: string
    # @schema
    name: node-feature-discovery
    # @schema
    # type: string
    # @schema
    version: 0.18.3
  # @schema
  # type: object
  # @schema
  release:
    # @schema
    # type: string
    # @schema
    namespace: node-feature-discovery
    # @schema
    # additionalProperties: true
    # @schema
    values: {}

# @schema
# type: object
# required: true
# @schema
# Settings for the NVIDIA GPU operator
nvidiaGPUOperator:
  # @schema
  # type: boolean
  # @schema
  # Indicates if the NVIDIA GPU operator should be enabled
  # Note that because it uses node feature discovery to run only on nodes
  # with an NVIDIA GPU available, the overhead of enabling this on clusters
  # that do not need it now but may need it in the future is low
  enabled: true
  # @schema
