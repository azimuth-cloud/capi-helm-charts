{{- /*
  Auth webhook config for Kamaji, mounted into the control plane pods (kubeadm
  writes the equivalent files to the nodes via openstack-cluster.patchConfigSpec).
*/}}
{{- if eq (include "openstack-cluster.controlplane.isKamaji" .) "true" }}
{{- if eq .Values.authWebhook "k8s-keystone-auth" }}
{{- $keystoneAuth := .Values.controlPlane.kamaji.keystoneAuth }}
---
# The webhook configuration mounted into the API server container
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openstack-cluster.componentName" (list . "auth-webhook") }}
  labels: {{ include "openstack-cluster.componentLabels" (list . "auth-webhook") | nindent 4 }}
stringData:
  keystone_webhook_config.yaml: |
    {{- include "openstack-cluster.keystoneWebhookKubeconfig" . | nindent 4 }}
---
# The TLS certificate, and optional policy and Keystone CA, for the
# k8s-keystone-auth sidecar container
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openstack-cluster.componentName" (list . "keystone-auth") }}
  labels: {{ include "openstack-cluster.componentLabels" (list . "keystone-auth") | nindent 4 }}
stringData:
  {{- if and $keystoneAuth.tls.cert $keystoneAuth.tls.key }}
  tls.crt: |
    {{- $keystoneAuth.tls.cert | trim | nindent 4 }}
  tls.key: |
    {{- $keystoneAuth.tls.key | trim | nindent 4 }}
  {{- else }}
  {{- /* TLS verification is disabled over localhost, so a fresh self-signed cert is fine */}}
  {{- $cert := genSelfSignedCert "k8s-keystone-auth" (list "127.0.0.1") (list "localhost") 3650 }}
  tls.crt: |
    {{- $cert.Cert | trim | nindent 4 }}
  tls.key: |
    {{- $cert.Key | trim | nindent 4 }}
  {{- end }}
  {{- with $keystoneAuth.policy }}
  policy.json: |
    {{- toPrettyJson . | nindent 4 }}
  {{- end }}
  {{- with $keystoneAuth.caCert }}
  ca.pem: |
    {{- . | trim | nindent 4 }}
  {{- end }}
{{- else if eq .Values.authWebhook "azimuth-authorization-webhook" }}
{{- $azimuth := .Values.azimuthAuthorizationWebhook }}
{{- $dir := "/etc/kubernetes/authz" }}
---
# The structured AuthorizationConfiguration and webhook kubeconfig (and optional
# CA) mounted into the API server container. The webhook server itself is external
# (azimuthAuthorizationWebhook.server), so no sidecar is needed.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openstack-cluster.componentName" (list . "auth-webhook") }}
  labels: {{ include "openstack-cluster.componentLabels" (list . "auth-webhook") | nindent 4 }}
stringData:
  authorization_config.yaml: |
    {{- include "openstack-cluster.azimuthAuthorizationConfig" (list . $dir) | nindent 4 }}
  azimuth_authorization_webhook_config.yaml: |
    {{- include "openstack-cluster.azimuthWebhookKubeconfig" (list . $dir) | nindent 4 }}
  {{- if $azimuth.tls.enabled }}
  ca.pem: |
    {{- required "azimuthAuthorizationWebhook.tls.cert is required when tls.enabled is true" $azimuth.tls.cert | trim | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
