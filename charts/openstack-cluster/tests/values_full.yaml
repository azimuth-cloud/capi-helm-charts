# group-1 replaces the default taints and exercises deduplication against
# kubeadmConfigSpec taints, group-2 inherits the default taints and group-3
# clears them with an explicit empty list
nodeGroupDefaults:
  nodeTaints:
    - key: my.company.org/default
      value: "true"
      effect: PreferNoSchedule

nodeGroups:
  - name: group-1
    machineFlavor: vm.small
    machineCount: 1
    nodeLabels:
      my.company.org/workload: gpu
    nodeTaints:
      - key: my.company.org/reserved
        value: "true"
        effect: NoSchedule
      - key: my.company.org/dedicated
        effect: NoExecute
    kubeadmConfigSpec:
      joinConfiguration:
        nodeRegistration:
          taints:
            - key: my.company.org/reserved
              value: "loses-to-nodeTaints"
              effect: NoSchedule
            - key: my.company.org/kubeadm
              effect: NoExecute
  - name: group-2
    machineFlavor: vm.large
    machineCountMin: 1
    machineCountMax: 3
    autoscale: true
  - name: group-3
    machineFlavor: vm.large
    machineCountMin: 0
    machineCountMax: 5
    autoscale: true
    nodeTaints: []

# Enable as many addons as possible for template
# validation and snapshot testing
addons:
  csi:
    cephfs:
      enabled: true
  openstack:
    enabled: true
    ccm:
      enabled: true
    csiCinder:
      enabled: true
    csiManila:
      enabled: true
    k8sKeystoneAuth:
      enabled: true
  etcdDefrag:
    enabled: true
  metricsServer:
    enabled: true
  monitoring:
    enabled: true
  nvidiaGPUOperator:
    enabled: true
  amdGPUOperator:
    enabled: true
  nodeFeatureDiscovery:
    enabled: true
  intelDevicePlugin:
    enabled: true
  ingress:
    enabled: true
    nginx:
      enabled: false
    traefik:
      enabled: true
  certManager:
    enabled: true
  mellanoxNetworkOperator:
    enabled: true
  nodeProblemDetector:
    enabled: true
  reloader:
    enabled: true
  headlamp:
    enabled: true
  custom:
    my-custom-helm-release:
      kind: HelmRelease
      spec:
        namespace: my-namespace
        chart:
          repo: https://my-project/charts
          name: my-chart
          version: 1.5.0
        values: {}
    my-custom-manifests:
      kind: Manifests
      spec:
        namespace: my-namespace
        manifests:
          secret.yaml: |-
            apiVersion: v1
            kind: Secret
            metadata:
              name: my-secret
            stringData:
              secret-file: "secret-data"
